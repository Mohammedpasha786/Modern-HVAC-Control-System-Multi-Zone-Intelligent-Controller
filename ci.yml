name: CI — HVAC Control System

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full simulation regression test (Sunday 03:00 UTC)
    - cron: '0 3 * * 0'

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Lint & Code Quality
  # ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff (fast linter + formatter check)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --strict-optional
        continue-on-error: true   # gradual typing — warn but don't fail

  # ──────────────────────────────────────────────────────────────────────
  # Unit Tests
  # ──────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -x

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────
  # Integration / Simulation Smoke Test
  # ──────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Simulation Test
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run 24h winter simulation
        run: |
          python -c "
          import sys; sys.path.insert(0, 'src')
          from simulation.simulator import HVACSimulator, synthetic_winter_week
          from models.thermal_zone import ZoneGeometry, ConstructionProperties
          from simulation.simulator import ZoneConfig

          geo = ZoneGeometry(floor_area=20, ceiling_height=2.7,
                             wall_area=45, window_area=4, roof_area=15)
          con = ConstructionProperties()
          zones = [ZoneConfig('TestZone', geo, con)]
          sim   = HVACSimulator(zones, dt=900)
          wx    = synthetic_winter_week(dt=900)[:96]  # 24h = 96 steps
          df    = sim.run(wx, verbose=False)

          summary = sim.energy_summary(df)
          print('✅ Winter sim OK — E_elec =', round(summary['total_electric_kWh'], 2), 'kWh')
          assert summary['total_electric_kWh'] > 0
          assert df['TestZone_T_zone'].between(10, 35).all(), 'Temperature out of range!'
          "

      - name: Run 24h summer simulation
        run: |
          python -c "
          import sys; sys.path.insert(0, 'src')
          from simulation.simulator import HVACSimulator, synthetic_summer_week, ZoneConfig
          from models.thermal_zone import ZoneGeometry, ConstructionProperties

          geo = ZoneGeometry(floor_area=20, ceiling_height=2.7,
                             wall_area=45, window_area=4, roof_area=15)
          zones = [ZoneConfig('TestZone', geo, ConstructionProperties())]
          sim   = HVACSimulator(zones, dt=900)
          wx    = synthetic_summer_week(dt=900)[:96]
          df    = sim.run(wx, verbose=False)
          summary = sim.energy_summary(df)
          print('✅ Summer sim OK — E_elec =', round(summary['total_electric_kWh'], 2), 'kWh')
          "

  # ──────────────────────────────────────────────────────────────────────
  # Performance Benchmark
  # ──────────────────────────────────────────────────────────────────────
  benchmark:
    name: Simulation Performance Benchmark
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-benchmark

      - name: Run performance benchmark
        run: |
          python -c "
          import sys, time; sys.path.insert(0, 'src')
          from simulation.simulator import HVACSimulator, synthetic_winter_week, ZoneConfig
          from models.thermal_zone import ZoneGeometry, ConstructionProperties

          geo = ZoneGeometry(20, 2.7, 45, 4, 15)
          zones = [ZoneConfig(f'Zone{i}', geo, ConstructionProperties()) for i in range(5)]
          sim = HVACSimulator(zones, dt=900)
          wx  = synthetic_winter_week(dt=900)  # 7 days = 672 steps

          t0 = time.perf_counter()
          df = sim.run(wx, verbose=False)
          elapsed = time.perf_counter() - t0

          steps_per_sec = len(wx) / elapsed
          print(f'⏱️  5-zone 7-day sim: {elapsed:.2f}s ({steps_per_sec:.0f} steps/s)')
          assert steps_per_sec > 50, f'Too slow: {steps_per_sec:.0f} steps/s'
          "

  # ──────────────────────────────────────────────────────────────────────
  # Documentation Build
  # ──────────────────────────────────────────────────────────────────────
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install doc dependencies
        run: pip install mkdocs mkdocs-material mkdocstrings[python]

      - name: Build docs
        run: mkdocs build --strict
        continue-on-error: true   # docs are in progress

  # ──────────────────────────────────────────────────────────────────────
  # Security Scan
  # ──────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install bandit safety
      - run: bandit -r src/ -ll
      - run: safety check --json || true  # warn but don't block
