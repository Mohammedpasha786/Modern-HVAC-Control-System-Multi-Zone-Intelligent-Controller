name: Weekly Annual Simulation

on:
  schedule:
    - cron: '0 4 * * 1'   # Monday 04:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  annual-simulation:
    name: Run Annual Energy Simulation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run annual simulation (5-zone house, 365 days)
        run: |
          python -c "
          import sys, json, numpy as np
          sys.path.insert(0, 'src')
          from simulation.simulator import (
              HVACSimulator, ZoneConfig,
              synthetic_winter_week, synthetic_summer_week
          )
          from models.thermal_zone import ZoneGeometry, ConstructionProperties

          # Build 5-zone house
          zones = [
              ZoneConfig('LivingRoom', ZoneGeometry(30, 2.7, 60, 8, 0),   ConstructionProperties()),
              ZoneConfig('MasterBed',  ZoneGeometry(18, 2.7, 40, 3, 15),  ConstructionProperties()),
              ZoneConfig('Bedroom2',   ZoneGeometry(14, 2.7, 35, 2.5, 10),ConstructionProperties()),
              ZoneConfig('Kitchen',    ZoneGeometry(15, 2.7, 35, 3, 0),   ConstructionProperties()),
              ZoneConfig('Office',     ZoneGeometry(12, 2.7, 30, 2, 0),   ConstructionProperties()),
          ]
          sim = HVACSimulator(zones, dt=900)

          # Generate full year weather (simplified: repeat 26x winter + 26x summer)
          wx_winter = synthetic_winter_week(dt=900)
          wx_summer = synthetic_summer_week(dt=900)
          # Approximate annual profile: 26 winter weeks + 26 summer weeks
          wx_annual = wx_winter * 26 + wx_summer * 26

          print(f'Running {len(wx_annual)} steps ({len(wx_annual)*900/3600/24:.0f} days)...')
          df = sim.run(wx_annual, verbose=True)

          summary = sim.energy_summary(df)
          print('\n=== Annual Energy Summary ===')
          for k, v in summary.items():
              print(f'  {k}: {v:.2f}')

          # Save results artifact
          import os; os.makedirs('artifacts', exist_ok=True)
          df.to_parquet('artifacts/annual_simulation.parquet')
          with open('artifacts/energy_summary.json', 'w') as f:
              json.dump(summary, f, indent=2)

          # Fail if energy is unreasonably high or low
          E = summary['total_electric_kWh']
          assert 1000 < E < 50000, f'Annual energy {E:.0f} kWh out of expected range'
          print(f'\n✅ Annual simulation complete — Total HVAC: {E:.0f} kWh/yr')
          "

      - name: Upload simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: annual-simulation-results-${{ github.run_number }}
          path: artifacts/
          retention-days: 90

      - name: Post summary to GitHub Step Summary
        run: |
          python -c "
          import json
          with open('artifacts/energy_summary.json') as f:
              s = json.load(f)
          lines = ['## 📊 Weekly Annual Simulation Results\n']
          lines.append('| Metric | Value |')
          lines.append('|--------|-------|')
          for k, v in s.items():
              lines.append(f'| {k.replace(\"_\", \" \").title()} | {v:.2f} |')
          print('\n'.join(lines))
          " >> $GITHUB_STEP_SUMMARY
